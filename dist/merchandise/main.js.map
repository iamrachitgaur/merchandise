<div class="container-md">
  <div class="d-flex justify-content-between align-items-center">
    <div class="my-3 heading-3">
      New Orders
    </div>
    <div>
      <span class="badge rounded-pill text-bg-success">5 Items</span>
    </div>
  </div>

    <div class="my-3">
      <div class="m-2 p-2 card-orders rounded-4 overflow-x-auto">
        <div class="m-2 card rounded-4" *ngFor="let product of products">
          <div class="card-body">
            <div class="row gap-3">

              <div class="col-3">
                <img class="product-image rounded-3" src="https://placehold.co/80x80"/>
              </div>
              <div class="col-5">
                <div class="heading-5 text-wrap">Cally Canali Collection</div>
                <div class="heading-5 text-gray">Pants</div>
              </div>
              <div class="col">
                $50.00
              </div>

            </div>
          </div>
        </div>
      </div>
    </div>


</div>
<app-footer></app-footer>
