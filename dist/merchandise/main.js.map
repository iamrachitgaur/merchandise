<div class="container mt-5">
  
    <div class="my-3 heading-3"> Add Product </div>

    <form [formGroup]="productForm" (ngSubmit)="addProduct()" class="needs-validation" novalidate>

      <div class="py-3">
      <img class="product_image rounded-2" [src]="imagePreview ? imagePreview : 'https://placehold.co/300x300?text=No+Preview'" alt="product_image">
      </div>

      <div class="mb-3">
        <label for="name" class="form-label">Product Name</label>
        <input type="text" class="form-control" id="name" formControlName="name" required>
        <div class="invalid-feedback" *ngIf="productForm.get('name').invalid && (productForm.get('name').dirty || productForm.get('name').touched)">
          Product name is required.
        </div>
      </div>
  
      <div class="mb-3">
        <label for="product_image" class="form-label">Product Image URL</label>
        <input type="file" class="p-0 form-control" style="visibility: hidden;width: 0px;height: 0px;" (change)="uploadProductImage($event)" id="product_image" #productImage formControlName="product_image" required>
        <button class="btn btn-sm button-blue rounded-pill" (click)="productImage.click()">Product Image</button>
        <div class="invalid-feedback" *ngIf="productForm.get('product_image').invalid && (productForm.get('product_image').dirty || productForm.get('product_image').touched)">
          Product image URL is required.
        </div>
      </div>
  
      <div class="mb-3">
        <label for="price" class="form-label">Price</label>
        <input type="number" class="form-control" id="price" formControlName="price" required min="0" step="0.01">
        <div class="invalid-feedback" *ngIf="productForm.get('price').invalid && (productForm.get('price').dirty || productForm.get('price').touched)">
          Price is required and must be a positive number.
        </div>
      </div>
  
      <div class="mb-3">
        <label for="description" class="form-label">Description</label>
        <textarea class="form-control" id="description" formControlName="description" rows="3" required></textarea>
        <div class="invalid-feedback" *ngIf="productForm.get('description').invalid && (productForm.get('description').dirty || productForm.get('description').touched)">
          Description is required.
        </div>
      </div>
      <div class="py-3">
      <button type="submit" class="btn btn-sm button-blue rounded-pill" [disabled]="productForm.invalid">Add Product</button>
      </div>
    </form>
  </div>
