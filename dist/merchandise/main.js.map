<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container-fluid">


        <div class="d-flex justify-content-center align-items-center">
          <a class="navbar-brand" routerLink="/">
            <img style="width: 30px;" src="./assets/logo.svg"/>
        </a>
        </div>
        
        <div class="d-flex gap-4">
        <div class="d-none d-md-flex justify-content-center align-items-center gap-4">
      
          <!-- home -->
          <a class="nav-link" routerLinkActive="active" [routerLinkActiveOptions]="{exact:true}" routerLink="/">
            <span class="material-symbols-rounded">
              home
              </span>
          </a>
          <!-- cart -->
          <div class="position-relative">
            <div class="p-1">
            <a class="nav-link" routerLinkActive="active" routerLink="/cart">
          <span class="material-symbols-rounded">
            shopping_bag
            </span>
            </a>
          </div>
            <span class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">
              99+
              <span class="visually-hidden">unread messages</span>
            </span>
          </div>
          <!-- favourite -->
          <span class="material-symbols-rounded">
            favorite
          </span>
          <!-- profile -->
          <a class="nav-link" routerLinkActive="active" routerLink="/profile">
            <span class="material-symbols-rounded">
              person
              </span>
              </a>
          </div>
          <div class="d-flex justify-content-center align-items-center gap-2">
            <ng-container *ngIf="isLoggedIn$ | async; else loggedOut">

              <!-- Auth Badge -->
              <div *ngIf="user$ | async as user">
                <div *ngIf="user.user.avatar; else defaultAvatar">
                  <img class="avatar rounded-circle" [src]="user.user.avatar.url"/>
                </div>
                <ng-template #defaultAvatar>
                  <div class="avatar rounded-circle d-flex justify-content-center align-items-center" [ngStyle]="{'background-color': user.user.profileColor}">
                    {{user.user.name | split}}
                  </div>
                </ng-template>
                
              </div>

            <span class="material-symbols-rounded" (click)="logout()">
              logout
            </span>

          </ng-container>
            <ng-template #loggedOut>
              <!-- login -->
            <button class="btn btn-sm button-blue rounded-pill" routerLink="/auth">Login</button>
            <button class="btn btn-sm button-grey rounded-pill" routerLink="/auth">Signup</button>
            </ng-template>
          
      
          </div>
        </div>
  
    </div>
  </nav>
